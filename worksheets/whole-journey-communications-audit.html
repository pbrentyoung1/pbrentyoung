<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plot the Journey — Worksheet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap');

:root{
  --ink:#2b2a27; --ink-soft:#4a4842; --ink-mute:#6b6860;
  --blue:#1f83a3; --blue-line:#a8d4e2; --rust:#c1271d;
  --hairline:#d9d4c7; --paper:#ffffff;
  --serif:'Playfair Display',Georgia,serif;
  --mono:'IBM Plex Mono','Courier New',monospace;
  --text:'Source Serif 4',Georgia,serif;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#e9e6dd;color:var(--ink);
  -webkit-print-color-adjust:exact;print-color-adjust:exact;}

.sheet{
  width:8.5in;min-height:11in;margin:24px auto;padding:0.6in 0.65in 0.55in;
  background:var(--paper);position:relative;
  box-shadow:0 8px 30px rgba(0,0,0,.14);
}

.kicker{font-family:var(--mono);font-size:9.5pt;font-weight:500;letter-spacing:.22em;color:var(--blue);margin:0 0 6px;}
h1{font-family:var(--serif);font-weight:700;font-size:34pt;line-height:1.02;letter-spacing:-.01em;margin:0 0 10px;color:var(--ink);}
.dek{font-family:var(--text);font-size:11pt;line-height:1.5;color:var(--ink-soft);margin:0;max-width:6.4in;}

/* Oxford double rule */
.rule{margin:16px 0 0;}
.rule::before{content:"";display:block;height:3px;background:var(--ink);}
.rule::after{content:"";display:block;height:1px;background:var(--ink);margin-top:3px;}

.chart{width:100%;margin:14px auto 0;}
.chart svg{width:100%;height:auto;display:block;}

svg .v-label{font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:.11em;fill:var(--ink);}
svg .v-q{font-family:'Source Serif 4',Georgia,serif;font-style:italic;font-size:16px;fill:var(--ink-mute);}
svg .center-label{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.18em;fill:var(--ink-mute);}

.foot{position:absolute;left:0.65in;right:0.65in;bottom:0.4in;
  display:flex;justify-content:space-between;
  font-family:var(--mono);font-size:8pt;letter-spacing:.16em;color:var(--ink-mute);
  border-top:1px solid var(--hairline);padding-top:8px;}

.printbar{max-width:8.5in;margin:16px auto 0;text-align:center;}
.printbar button{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--ink);
  background:#fff;border:1px solid var(--ink);padding:9px 18px;cursor:pointer;}
.printbar button:hover{background:var(--rust);color:#fff;border-color:var(--rust);}

@page{size:letter portrait;margin:0;}
@media print{
  html,body{background:#fff;}
  .sheet{width:auto;min-height:auto;margin:0;padding:0.55in 0.6in;box-shadow:none;}
  .printbar{display:none;}
  .foot{position:fixed;}
}
</style>
</head>
<body>

<div class="printbar"><button onclick="window.print()">PRINT / SAVE AS PDF</button></div>

<div class="sheet">
  <p class="kicker">WORKSHEET&nbsp;&nbsp;/&nbsp;&nbsp;CURRENT STATE</p>
  <h1>Plot the Journey</h1>
  <p class="dek">Write an abbreviation for each communication piece on the spoke it serves. Move outward for broader reach, inward for more niche or insider communication.</p>

  <div class="rule"></div>

  <div class="chart">
    <svg viewBox="-150 0 1320 1010" role="img" aria-label="Five-spoke journey radar: Awareness, Visit, Attend, Member, Minister">
      <!-- inner rings -->
      <g fill="none" stroke="#d9d4c7" stroke-width="1.1">
        <polygon points="500,456 579.9,514.0 549.4,608.0 450.6,608.0 420.1,514.0"/>
        <polygon points="500,372 659.8,488.1 598.8,675.9 401.2,675.9 340.2,488.1"/>
        <polygon points="500,288 739.7,462.1 648.1,743.9 351.9,743.9 260.3,462.1"/>
        <polygon points="500,204 819.6,436.2 697.5,811.8 302.5,811.8 180.4,436.2"/>
      </g>
      <!-- pentagram diagonals, faint -->
      <g stroke="#a8d4e2" stroke-width="1.1" opacity="0.5">
        <line x1="500" y1="120" x2="746.9" y2="879.8"/>
        <line x1="500" y1="120" x2="253.1" y2="879.8"/>
        <line x1="899.4" y1="410.2" x2="253.1" y2="879.8"/>
        <line x1="899.4" y1="410.2" x2="100.6" y2="410.2"/>
        <line x1="746.9" y1="879.8" x2="100.6" y2="410.2"/>
      </g>
      <!-- spokes -->
      <g stroke="#c9c2af" stroke-width="1.1">
        <line x1="500" y1="540" x2="500" y2="120"/>
        <line x1="500" y1="540" x2="899.4" y2="410.2"/>
        <line x1="500" y1="540" x2="746.9" y2="879.8"/>
        <line x1="500" y1="540" x2="253.1" y2="879.8"/>
        <line x1="500" y1="540" x2="100.6" y2="410.2"/>
      </g>
      <!-- outer pentagon, brand blue -->
      <polygon points="500,120 899.4,410.2 746.9,879.8 253.1,879.8 100.6,410.2" fill="none" stroke="#1f83a3" stroke-width="2.4"/>
      <!-- plot anchors -->
      <g fill="#ffffff" stroke="#c9c2af" stroke-width="1.1">
        <circle cx="500" cy="456" r="6"/><circle cx="500" cy="372" r="6"/><circle cx="500" cy="288" r="6"/><circle cx="500" cy="204" r="6"/><circle cx="500" cy="120" r="6"/>
        <circle cx="579.9" cy="514.0" r="6"/><circle cx="659.8" cy="488.1" r="6"/><circle cx="739.7" cy="462.1" r="6"/><circle cx="819.6" cy="436.2" r="6"/><circle cx="899.4" cy="410.2" r="6"/>
        <circle cx="549.4" cy="608.0" r="6"/><circle cx="598.8" cy="675.9" r="6"/><circle cx="648.1" cy="743.9" r="6"/><circle cx="697.5" cy="811.8" r="6"/><circle cx="746.9" cy="879.8" r="6"/>
        <circle cx="450.6" cy="608.0" r="6"/><circle cx="401.2" cy="675.9" r="6"/><circle cx="351.9" cy="743.9" r="6"/><circle cx="302.5" cy="811.8" r="6"/><circle cx="253.1" cy="879.8" r="6"/>
        <circle cx="420.1" cy="514.0" r="6"/><circle cx="340.2" cy="488.1" r="6"/><circle cx="260.3" cy="462.1" r="6"/><circle cx="180.4" cy="436.2" r="6"/><circle cx="100.6" cy="410.2" r="6"/>
      </g>
      <!-- center bullseye -->
      <circle cx="500" cy="540" r="64" fill="#ffffff" stroke="#c9c2af" stroke-width="1.1"/>
      <text class="center-label" x="500" y="534" text-anchor="middle">NICHE</text>
      <text class="center-label" x="500" y="554" text-anchor="middle">INSIDER</text>
      <!-- vertex labels -->
      <text class="v-label" x="500" y="66" text-anchor="middle">AWARENESS</text>
      <text class="v-q" x="500" y="92" text-anchor="middle">Who are these people?</text>

      <text class="v-label" x="928" y="400" text-anchor="start">VISIT</text>
      <text class="v-q" x="928" y="426" text-anchor="start">Is this worth exploring?</text>

      <text class="v-label" x="770" y="928" text-anchor="middle">ATTEND</text>
      <text class="v-q" x="770" y="954" text-anchor="middle">Do I want to come back?</text>

      <text class="v-label" x="240" y="928" text-anchor="middle">MEMBER</text>
      <text class="v-q" x="240" y="954" text-anchor="middle">Is this my church?</text>

      <text class="v-label" x="72" y="400" text-anchor="end">MINISTER</text>
      <text class="v-q" x="72" y="426" text-anchor="end">How can I prepare a place</text>
      <text class="v-q" x="72" y="448" text-anchor="end">for someone else?</text>
    </svg>
  </div>

  <div class="foot">
    <span>WHOLE JOURNEY COMMUNICATIONS AUDIT</span>
    <span>BRENT YOUNG&nbsp;&middot;&nbsp;03</span>
  </div>
</div>

</body>
</html>
