<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
* { margin: 0; padding: 0; }
body { width: 512px; height: 512px; overflow: hidden; }
.tile {
  position: relative;
  width: 512px; height: 512px;
  background: #f4f1ea;
  display: flex; align-items: center; justify-content: center;
}
.mono {
  font-family: 'Playfair Display', Georgia, serif;
  font-weight: 700;
  font-size: 300px;
  letter-spacing: -18px;
  color: #2b2a27;
  line-height: 1;
  padding-right: 18px; /* offset the tracking on the last letter */
  padding-bottom: 40px;
}
.strike {
  position: absolute;
  left: 96px; right: 96px;
  bottom: 108px;
  height: 18px;
  background: #c1271d;
  transform: rotate(-1.2deg);
  border-radius: 9px;
}
</style>
</head>
<body>
<div class="tile">
  <div class="mono">BY</div>
  <div class="strike"></div>
</div>
</body>
</html>
