<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">The communications conveyor belt</title><desc id="desc">A system carries the schedule, Brand carries the decisions, and templates carry the routine, creating margin for ministry.</desc>
  <defs>
    <filter id="plateShadow" x="-8%" y="-8%" width="116%" height="118%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#2b2a27" flood-opacity=".16"/></filter><filter id="tapeShadow"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#2b2a27" flood-opacity=".12"/></filter>
    <linearGradient id="tapeGrad"><stop stop-color="#fcf9f0" stop-opacity=".62"/><stop offset="1" stop-color="#f0ead8" stop-opacity=".56"/></linearGradient>
    <style>.h{font-family:'Playfair Display',Georgia,serif;font-weight:700;fill:#2b2a27}.mono{font-family:'IBM Plex Mono',Consolas,monospace}.body{font-family:'Source Serif 4',Georgia,serif;fill:#4a4842}</style>
  </defs>
  <g transform="rotate(-.3 700 430)">
    <rect x="40" y="44" width="1320" height="772" fill="#ebe6da" stroke="#d9d4c7" filter="url(#plateShadow)"/>
    <text x="104" y="112" class="mono" font-size="16" letter-spacing="3" fill="#34715f">FIELD DIAGRAM · SYSTEMS &amp; WORKFLOW</text>
    <text x="104" y="166" class="h" font-size="48">The communications conveyor belt</text>
    <text x="104" y="202" class="mono" font-size="16" letter-spacing="2.4" fill="#6b6860">THREE CONTROLS TURN REQUESTS INTO MARGIN</text>
    <rect x="104" y="224" width="1192" height="3" fill="#2b2a27"/><rect x="104" y="230" width="1192" height="1" fill="#2b2a27"/>

    <text x="104" y="286" class="mono" font-size="14" letter-spacing="1.5" fill="#c1271d">REQUESTS ENTER</text>
    <g class="mono" font-size="13" font-weight="700"><g transform="rotate(-7 146 332)"><rect x="104" y="304" width="116" height="54" fill="#c1271d"/><text x="162" y="337" text-anchor="middle" fill="#fff">URGENT?</text></g><g transform="rotate(6 214 368)"><rect x="148" y="342" width="148" height="52" fill="#e8a81c"/><text x="222" y="374" text-anchor="middle" fill="#2b2a27">ONE QUICK THING</text></g></g>
    <rect x="104" y="414" width="1192" height="92" fill="#2b2a27"/>
    <polygon points="1296,414 1340,460 1296,506" fill="#2b2a27"/>

    <g>
      <circle cx="440" cy="460" r="112" fill="#34715f"/><circle cx="440" cy="460" r="55" fill="#fff"/><text x="440" y="472" text-anchor="middle" class="mono" font-size="38" font-weight="700" fill="#34715f">1</text>
      <circle cx="740" cy="460" r="112" fill="#1f83a3"/><circle cx="740" cy="460" r="55" fill="#fff"/><text x="740" y="472" text-anchor="middle" class="mono" font-size="38" font-weight="700" fill="#1f83a3">2</text>
      <circle cx="1040" cy="460" r="112" fill="#e8a81c"/><circle cx="1040" cy="460" r="55" fill="#fff"/><text x="1040" y="472" text-anchor="middle" class="mono" font-size="38" font-weight="700" fill="#b97600">3</text>
    </g>
    <g text-anchor="middle"><text x="440" y="610" class="h" font-size="31">System</text><text x="740" y="610" class="h" font-size="31">Brand</text><text x="1040" y="610" class="h" font-size="31">Templates</text>
      <g class="mono" font-size="13" letter-spacing="1.5" fill="#6b6860"><text x="440" y="638">CARRIES THE SCHEDULE</text><text x="740" y="638">CARRIES THE DECISIONS</text><text x="1040" y="638">CARRY THE ROUTINE</text></g>
      <g class="body" font-size="18"><text x="440" y="674"><tspan x="440">One intake. Real lead times.</tspan><tspan x="440" dy="24">Clear scope before work begins.</tspan></text><text x="740" y="674"><tspan x="740">Voice and priorities are settled</tspan><tspan x="740" dy="24">before the request arrives.</tspan></text><text x="1040" y="674"><tspan x="1040">Recurring pieces leave your desk</tspan><tspan x="1040" dy="24">ready to use and on Brand.</tspan></text></g>
    </g>
    <rect x="104" y="748" width="1192" height="44" fill="#2b2a27"/><text x="700" y="776" text-anchor="middle" class="mono" font-size="15" letter-spacing="1.2" fill="#f4f1ea">SYSTEM + BRAND + TEMPLATES = MARGIN FOR MINISTRY</text>
  </g>
  <g transform="rotate(-3.5 360 46)"><rect x="270" y="26" width="180" height="40" fill="url(#tapeGrad)" filter="url(#tapeShadow)"/></g><g transform="rotate(2.6 1040 46)"><rect x="950" y="26" width="180" height="40" fill="url(#tapeGrad)" filter="url(#tapeShadow)"/></g>
</svg>
