<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Trust is built at the touchpoints</title><desc id="desc">A journey map showing questions, common touchpoints, and trust-building opportunities from awareness through minister.</desc>
  <defs>
    <filter id="plateShadow" x="-8%" y="-8%" width="116%" height="118%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#2b2a27" flood-opacity=".16"/></filter><filter id="tapeShadow"><feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#2b2a27" flood-opacity=".12"/></filter>
    <linearGradient id="tapeGrad"><stop stop-color="#fcf9f0" stop-opacity=".62"/><stop offset="1" stop-color="#f0ead8" stop-opacity=".56"/></linearGradient>
    <style>.h{font-family:'Playfair Display',Georgia,serif;font-weight:700;fill:#2b2a27}.mono{font-family:'IBM Plex Mono',Consolas,monospace}.body{font-family:'Source Serif 4',Georgia,serif;fill:#4a4842}</style>
  </defs>
  <g transform="rotate(-.25 800 490)">
    <rect x="40" y="44" width="1520" height="892" fill="#ebe6da" stroke="#d9d4c7" filter="url(#plateShadow)"/>
    <text x="104" y="112" class="mono" font-size="16" letter-spacing="3" fill="#1f83a3">FIELD DIAGRAM · RELATIONSHIP JOURNEY</text>
    <text x="104" y="166" class="h" font-size="50">Trust is built at the touchpoints</text>
    <text x="104" y="202" class="mono" font-size="15" letter-spacing="2" fill="#6b6860">ONE PERSON · ONE JOURNEY · MANY ENCOUNTERS</text>
    <rect x="104" y="224" width="1392" height="3" fill="#2b2a27"/><rect x="104" y="230" width="1392" height="1" fill="#2b2a27"/>

    <rect x="104" y="264" width="1392" height="596" fill="#fff" stroke="#d9d4c7"/>
    <g class="mono" font-size="12" letter-spacing="1.2" fill="#6b6860"><text x="124" y="316">STAGE</text><text x="124" y="412">THEY ARE ASKING</text><text x="124" y="566">COMMON TOUCHPOINTS</text><text x="124" y="776">TRUST GROWS WHEN</text></g>

    <g class="mono" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">
      <rect x="264" y="282" width="246" height="62" fill="#2b2a27"/><text x="387" y="320">AWARENESS</text>
      <rect x="510" y="282" width="246" height="62" fill="#297e9b"/><text x="633" y="320">VISIT</text>
      <rect x="756" y="282" width="246" height="62" fill="#5596ad"/><text x="879" y="320">ATTEND</text>
      <rect x="1002" y="282" width="246" height="62" fill="#79aabd"/><text x="1125" y="320">MEMBER</text>
      <rect x="1248" y="282" width="248" height="62" fill="#c1271d"/><text x="1372" y="320">MINISTER</text>
    </g>
    <g stroke="#d9d4c7"><line x1="264" y1="264" x2="264" y2="860"/><line x1="510" y1="264" x2="510" y2="860"/><line x1="756" y1="264" x2="756" y2="860"/><line x1="1002" y1="264" x2="1002" y2="860"/><line x1="1248" y1="264" x2="1248" y2="860"/><line x1="104" y1="370" x2="1496" y2="370"/><line x1="104" y1="492" x2="1496" y2="492"/><line x1="104" y1="708" x2="1496" y2="708"/></g>

    <g class="h" font-size="21"><text x="286" y="408"><tspan x="286">Who are these</tspan><tspan x="286" dy="24">people?</tspan></text><text x="532" y="408"><tspan x="532">Is this worth</tspan><tspan x="532" dy="24">exploring?</tspan></text><text x="778" y="408"><tspan x="778">Do I want to</tspan><tspan x="778" dy="24">come back?</tspan></text><text x="1024" y="408">Is this my church?</text><text x="1270" y="408"><tspan x="1270">How can I prepare a</tspan><tspan x="1270" dy="24">place for someone else?</tspan></text></g>
    <g class="mono" font-size="14" fill="#4a4842">
      <text x="286" y="538"><tspan x="286">Social media</tspan><tspan x="286" dy="34">YouTube</tspan><tspan x="286" dy="34">Search results</tspan><tspan x="286" dy="34">A friend's invitation</tspan></text>
      <text x="532" y="538"><tspan x="532">Website</tspan><tspan x="532" dy="34">Plan-a-visit page</tspan><tspan x="532" dy="34">Parking and signage</tspan><tspan x="532" dy="34">Children's check-in</tspan></text>
      <text x="778" y="538"><tspan x="778">Worship experience</tspan><tspan x="778" dy="34">Personal welcome</tspan><tspan x="778" dy="34">Follow-up email</tspan><tspan x="778" dy="34">A second visit</tspan></text>
      <text x="1024" y="538"><tspan x="1024">Membership class</tspan><tspan x="1024" dy="34">Small groups</tspan><tspan x="1024" dy="34">Pastoral care</tspan><tspan x="1024" dy="34">Communication rhythms</tspan></text>
      <text x="1270" y="538"><tspan x="1270">Personal invitation</tspan><tspan x="1270" dy="34">Application</tspan><tspan x="1270" dy="34">Training</tspan><tspan x="1270" dy="34">Scheduling and feedback</tspan></text>
    </g>
    <g class="body" font-size="18"><text x="286" y="758"><tspan x="286">The story is clear</tspan><tspan x="286" dy="24">and recognizable.</tspan></text><text x="532" y="758"><tspan x="532">Anxiety is anticipated;</tspan><tspan x="532" dy="24">the next step is obvious.</tspan></text><text x="778" y="758"><tspan x="778">The experience keeps</tspan><tspan x="778" dy="24">the promise made online.</tspan></text><text x="1024" y="758"><tspan x="1024">Belonging becomes</tspan><tspan x="1024" dy="24">mutual commitment.</tspan></text><text x="1270" y="758"><tspan x="1270">Gifts are known and</tspan><tspan x="1270" dy="24">expectations are clear.</tspan></text></g>
    <rect x="104" y="878" width="1392" height="44" fill="#2b2a27"/><text x="800" y="906" text-anchor="middle" class="mono" font-size="15" letter-spacing="1.2" fill="#f4f1ea">WE BEGIN CARING FOR PEOPLE BEFORE WE KNOW THEIR NAMES</text>
  </g>
  <g transform="rotate(-3.5 420 46)"><rect x="330" y="26" width="180" height="40" fill="url(#tapeGrad)" filter="url(#tapeShadow)"/></g><g transform="rotate(2.6 1180 46)"><rect x="1090" y="26" width="180" height="40" fill="url(#tapeGrad)" filter="url(#tapeShadow)"/></g>
</svg>
